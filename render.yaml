services:
  # Backend API (FastAPI)
  - type: web
    name: cinema-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/.cache/ms-playwright"

  # Frontend Dashboard (React static site)
  - type: web
    name: cinema-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: "https://cinema-1-4p9y.onrender.com"
